{% extends "base.html" %}

{% block title %}
註冊
{% endblock %}

{% block content %}

<div class="login-container">

    <div class="login-card">

        <h2>建立帳號</h2>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="使用者名稱"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="密碼"
                required
            >

            <button type="submit">
                註冊
            </button>

        </form>

    </div>

</div>

{% endblock %}
