{% extends "base.html" %}

{% block title %}
登入
{% endblock %}

{% block content %}

<div class="login-container">

    <div class="login-card">

        <h2>登入</h2>

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                登入
            </button>

        </form>

    </div>

</div>

{% endblock %}
